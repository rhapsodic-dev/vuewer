name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  gate:
      uses: rhapsodic-dev/renovate-ci-gate/.github/workflows/renovate-ci-gate.yml@v1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.run_ci == 'true'

    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "pnpm"
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies 👨🏻‍💻
        run: pnpm ci

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

      - name: Css style check
        run: pnpm run lint:styles

      - name: Js style check
        run: pnpm run lint:scripts

      - name: Run build
        run: pnpm run build

      - name: Run playground build
        run: pnpm run build:playground
